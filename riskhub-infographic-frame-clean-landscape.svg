    <line x1="1566" y1="416" x2="1630" y2="416" stroke="rgba(181,196,255,0.40)" stroke-width="4" stroke-linecap="round"/>
    <line x1="1674" y1="416" x2="1738" y2="416" stroke="rgba(181,196,255,0.40)" stroke-width="4" stroke-linecap="round"/>
    <rect x="1400" y="372" width="88" height="10" rx="5" fill="rgba(255,255,255,0.16)"/>
    <rect x="1508" y="372" width="88" height="10" rx="5" fill="rgba(255,255,255,0.16)"/>
    <rect x="1616" y="372" width="88" height="10" rx="5" fill="rgba(255,255,255,0.16)"/>
    <rect x="1724" y="372" width="88" height="10" rx="5" fill="rgba(255,255,255,0.16)"/>
    <rect x="1400" y="464" width="96" height="10" rx="5" fill="rgba(255,255,255,0.10)"/>
    <rect x="1508" y="464" width="112" height="10" rx="5" fill="rgba(255,255,255,0.10)"/>
    <rect x="1616" y="464" width="128" height="10" rx="5" fill="rgba(255,255,255,0.10)"/>
    <rect x="1724" y="464" width="108" height="10" rx="5" fill="rgba(255,255,255,0.10)"/>
