<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">RiskHub clean landscape infographic frame</title>
  <desc id="desc">Clean landscape infographic frame with placeholders for a designer to fill in content, screenshots, process, and call to action.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07101d"/>
      <stop offset="52%" stop-color="#0b1326"/>
      <stop offset="100%" stop-color="#121c2f"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#244da0" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#5e6d91" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b2438"/>
      <stop offset="100%" stop-color="#151d31"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b5c4ff"/>
      <stop offset="100%" stop-color="#2f6ef6"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffb59a"/>
      <stop offset="100%" stop-color="#ffb4ab"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#030815" flood-opacity="0.48"/>
    </filter>
    <style>
      .eyebrow { fill: #90a7e7; font: 600 17px 'Inter', 'Segoe UI', sans-serif; letter-spacing: 0.22em; text-transform: uppercase; }
      .heroTitle { fill: #f3f6ff; font: 800 62px 'Inter', 'Segoe UI', sans-serif; }
      .sectionTitle { fill: #eff4ff; font: 700 28px 'Inter', 'Segoe UI', sans-serif; }
      .label { fill: #9fb5ea; font: 600 12px 'Inter', 'Segoe UI', sans-serif; letter-spacing: 0.16em; text-transform: uppercase; }
      .cta { fill: #08111f; font: 700 20px 'Inter', 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="170" cy="170" r="260" fill="#14315f" opacity="0.18"/>
  <circle cx="1660" cy="160" r="260" fill="#153b72" opacity="0.14"/>
  <circle cx="1730" cy="950" r="260" fill="#6e2911" opacity="0.08"/>
  <rect x="40" y="32" width="1840" height="1016" rx="34" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)"/>

  <g filter="url(#softShadow)">
    <rect x="72" y="56" width="1776" height="202" rx="28" fill="url(#panel)" stroke="rgba(181,196,255,0.16)"/>
    <rect x="72" y="56" width="1776" height="202" rx="28" fill="url(#hero)"/>
    <text x="116" y="106" class="eyebrow">Hero Area</text>
    <text x="116" y="172" class="heroTitle">Project Name</text>
    <rect x="116" y="200" width="580" height="16" rx="8" fill="rgba(255,255,255,0.22)"/>
    <rect x="116" y="230" width="672" height="10" rx="5" fill="rgba(255,255,255,0.12)"/>

