    <rect x="688" y="366" width="608" height="32" rx="12" fill="rgba(26,86,219,0.12)" stroke="rgba(181,196,255,0.12)"/>
    <rect x="708" y="377" width="320" height="10" rx="5" fill="rgba(255,255,255,0.18)"/>
    <rect x="688" y="410" width="608" height="32" rx="12" fill="rgba(26,86,219,0.10)" stroke="rgba(181,196,255,0.10)"/>
    <rect x="708" y="421" width="360" height="10" rx="5" fill="rgba(255,255,255,0.14)"/>
