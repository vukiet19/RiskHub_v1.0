    <rect x="1400" y="702" width="184" height="12" rx="6" fill="rgba(255,255,255,0.18)"/>
    <circle cx="1410" cy="744" r="5" fill="#a8efb4"/>
    <rect x="1432" y="738" width="216" height="10" rx="5" fill="rgba(255,255,255,0.14)"/>
    <circle cx="1410" cy="778" r="5" fill="#a8efb4"/>
    <rect x="1432" y="772" width="248" height="10" rx="5" fill="rgba(255,255,255,0.11)"/>
    <circle cx="1410" cy="812" r="5" fill="#a8efb4"/>
