    <circle cx="870" cy="860" r="13" fill="#31394d" stroke="#ffb59a" stroke-width="3"/>
    <circle cx="994" cy="858" r="12" fill="#31394d" stroke="#ffb59a" stroke-width="3"/>
    <circle cx="990" cy="892" r="12" fill="#31394d" stroke="#ffb59a" stroke-width="3"/>
    <line x1="883" y1="864" x2="908" y2="870" stroke="#ffb4ab" stroke-width="4" stroke-linecap="round"/>
    <line x1="952" y1="866" x2="980" y2="862" stroke="#ffb4ab" stroke-width="4" stroke-linecap="round"/>
    <line x1="950" y1="880" x2="978" y2="888" stroke="#ffb4ab" stroke-width="4" stroke-linecap="round"/>
