    <text x="102" y="578" class="label">Card 01</text>
    <rect x="102" y="600" width="186" height="12" rx="6" fill="rgba(255,255,255,0.18)"/>
    <rect x="102" y="626" width="244" height="10" rx="5" fill="rgba(255,255,255,0.10)"/>
    <rect x="102" y="652" width="548" height="44" rx="14" fill="#0b1326" stroke="rgba(255,255,255,0.08)"/>
