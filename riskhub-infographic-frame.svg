<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-labelledby="title desc">
  <title id="title">RiskHub infographic frame</title>
  <desc id="desc">Portrait infographic frame for RiskHub hackathon submission, including hero, problem, solution, features, workflow, and call-to-action sections.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="52%" stop-color="#0b1326"/>
      <stop offset="100%" stop-color="#121c2f"/>
    </linearGradient>
    <linearGradient id="heroGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a56db" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#b5c4ff" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b2438"/>
      <stop offset="100%" stop-color="#151d31"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b5c4ff"/>
      <stop offset="100%" stop-color="#1a56db"/>
    </linearGradient>
    <linearGradient id="risk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffb59a"/>
      <stop offset="100%" stop-color="#ffb4ab"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#020611" flood-opacity="0.55"/>
    </filter>
    <filter id="blueGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#1a56db" flood-opacity="0.35"/>
    </filter>
    <style>
      .eyebrow { fill: #8ba3ea; font: 600 22px 'Inter', 'Segoe UI', sans-serif; letter-spacing: 0.24em; text-transform: uppercase; }
      .title { fill: #f2f6ff; font: 800 68px 'Inter', 'Segoe UI', sans-serif; }
      .subtitle { fill: #c4ccdd; font: 400 28px 'Inter', 'Segoe UI', sans-serif; }
      .section { fill: #f1f5ff; font: 700 34px 'Inter', 'Segoe UI', sans-serif; }
      .cardTitle { fill: #e6ecff; font: 700 24px 'Inter', 'Segoe UI', sans-serif; }
      .body { fill: #c3c9da; font: 400 22px 'Inter', 'Segoe UI', sans-serif; }
      .bodySmall { fill: #abb6cc; font: 400 19px 'Inter', 'Segoe UI', sans-serif; }
      .label { fill: #9bb1ea; font: 600 16px 'Inter', 'Segoe UI', sans-serif; letter-spacing: 0.16em; text-transform: uppercase; }
      .mono { fill: #dae2fd; font: 700 20px 'JetBrains Mono', 'Consolas', monospace; }
      .cta { fill: #08111f; font: 700 24px 'Inter', 'Segoe UI', sans-serif; }
      .bullet { fill: #ffb59a; font: 700 22px 'Inter', 'Segoe UI', sans-serif; }
      .mutedStroke { stroke: rgba(255,255,255,0.09); }
    </style>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <circle cx="180" cy="180" r="210" fill="#153164" opacity="0.18"/>
  <circle cx="930" cy="310" r="260" fill="#11376d" opacity="0.14"/>
  <circle cx="960" cy="1620" r="220" fill="#5f220d" opacity="0.12"/>

  <rect x="56" y="48" width="968" height="1824" rx="38" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)"/>

  <g filter="url(#softShadow)">
    <rect x="88" y="84" width="904" height="272" rx="30" fill="url(#panel)" stroke="rgba(181,196,255,0.16)"/>
    <rect x="88" y="84" width="904" height="272" rx="30" fill="url(#heroGlow)"/>
    <text x="128" y="138" class="eyebrow">Hackathon Fintech · Blockchain</text>
    <text x="128" y="214" class="title">RiskHub</text>
    <text x="128" y="262" class="subtitle">Nền tảng quản trị rủi ro giao dịch crypto đa sàn, chủ động cảnh báo hành vi và contagion danh mục.</text>
    <text x="128" y="312" class="body">Giúp trader nhìn thấy rủi ro tổng thể, phát hiện giao dịch cảm xúc sớm và ra quyết định kỷ luật hơn.</text>

    <rect x="736" y="122" width="208" height="180" rx="24" fill="#0b1326" stroke="rgba(255,255,255,0.08)"/>
    <text x="764" y="164" class="label">MVP Snapshot</text>
    <text x="764" y="210" class="mono">Binance + OKX</text>
    <text x="764" y="244" class="bodySmall">Read-only connection</text>
    <text x="764" y="278" class="mono">Alerts + Contagion</text>
    <text x="764" y="312" class="bodySmall">Dashboard đang demo được</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="88" y="392" width="430" height="252" rx="28" fill="url(#panel)" stroke="rgba(255,255,255,0.08)"/>
    <text x="120" y="446" class="section">1. Vấn đề</text>
    <circle cx="130" cy="496" r="5" fill="#ffb59a"/>
    <text x="152" y="503" class="body">Tài sản phân tán trên nhiều sàn, khó nhìn rủi ro tổng thể.</text>
    <circle cx="130" cy="548" r="5" fill="#ffb59a"/>
    <text x="152" y="555" class="body">Trader dễ rơi vào revenge trading, overtrading và đòn bẩy quá mức.</text>
    <circle cx="130" cy="610" r="5" fill="#ffb59a"/>
    <text x="152" y="617" class="body">Thiếu công cụ cảnh báo sớm trước khi drawdown lan rộng.</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="562" y="392" width="430" height="252" rx="28" fill="url(#panel)" stroke="rgba(255,255,255,0.08)"/>
    <text x="594" y="446" class="section">2. Giải pháp</text>
    <rect x="594" y="482" width="366" height="46" rx="14" fill="rgba(26,86,219,0.14)" stroke="rgba(181,196,255,0.16)"/>
    <text x="616" y="512" class="body">Multi-exchange visibility trên một dashboard duy nhất</text>
    <rect x="594" y="542" width="366" height="46" rx="14" fill="rgba(26,86,219,0.12)" stroke="rgba(181,196,255,0.12)"/>
    <text x="616" y="572" class="body">Behavioral Quant Engine đo discipline score và risk metrics</text>
    <rect x="594" y="602" width="366" height="46" rx="14" fill="rgba(255,181,154,0.12)" stroke="rgba(255,181,154,0.12)"/>
    <text x="616" y="632" class="body">Contagion map trực quan hóa nguồn rủi ro hệ thống</text>
  </g>

  <text x="88" y="710" class="section">3. Tính năng nổi bật của MVP</text>

  <g filter="url(#softShadow)">
    <rect x="88" y="742" width="430" height="218" rx="28" fill="url(#panel)" stroke="rgba(255,255,255,0.08)"/>
    <text x="118" y="790" class="cardTitle">Manage Connections</text>
    <text x="118" y="826" class="bodySmall">Kết nối Binance / OKX futures theo cơ chế read-only.</text>
    <rect x="118" y="850" width="370" height="86" rx="18" fill="#0b1326" stroke="rgba(255,255,255,0.08)"/>
    <rect x="136" y="870" width="160" height="16" rx="8" fill="rgba(181,196,255,0.28)"/>
    <rect x="136" y="898" width="210" height="12" rx="6" fill="rgba(255,255,255,0.10)"/>
    <rect x="360" y="868" width="108" height="36" rx="18" fill="rgba(26,86,219,0.24)"/>
    <text x="383" y="891" class="label" style="letter-spacing:0.1em;">Connect</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="562" y="742" width="430" height="218" rx="28" fill="url(#panel)" stroke="rgba(255,255,255,0.08)"/>
    <text x="592" y="790" class="cardTitle">Risk Dashboard</text>
    <text x="592" y="826" class="bodySmall">Portfolio value, Net PnL, Discipline Score, Max Drawdown.</text>
    <rect x="592" y="850" width="370" height="86" rx="18" fill="#0b1326" stroke="rgba(255,255,255,0.08)"/>
    <circle cx="636" cy="892" r="24" fill="none" stroke="url(#accent)" stroke-width="7"/>
    <text x="622" y="899" class="mono">92</text>
    <rect x="686" y="870" width="118" height="14" rx="7" fill="rgba(255,255,255,0.12)"/>
    <rect x="686" y="897" width="176" height="12" rx="6" fill="rgba(255,255,255,0.08)"/>
    <text x="872" y="898" class="mono" fill="#a8efb4">+$1.56M</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="88" y="988" width="430" height="218" rx="28" fill="url(#panel)" stroke="rgba(255,255,255,0.08)"/>
    <text x="118" y="1036" class="cardTitle">Live Alerts</text>
    <text x="118" y="1072" class="bodySmall">Cảnh báo hành vi giao dịch và rủi ro theo thời gian thực.</text>
    <rect x="118" y="1094" width="370" height="86" rx="18" fill="#0b1326" stroke="rgba(255,255,255,0.08)"/>
    <rect x="136" y="1112" width="8" height="50" rx="4" fill="url(#risk)"/>
    <rect x="162" y="1114" width="182" height="14" rx="7" fill="rgba(255,255,255,0.14)"/>
    <rect x="162" y="1140" width="246" height="12" rx="6" fill="rgba(255,255,255,0.08)"/>
    <rect x="420" y="1114" width="48" height="20" rx="10" fill="rgba(255,180,171,0.18)"/>
    <text x="429" y="1129" class="label" style="letter-spacing:0.08em;">Live</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="562" y="988" width="430" height="218" rx="28" fill="url(#panel)" stroke="rgba(255,255,255,0.08)"/>
    <text x="592" y="1036" class="cardTitle">Portfolio Contagion Map</text>
    <text x="592" y="1072" class="bodySmall">Systemic asset, top risk pair, cluster risk và focus view.</text>
    <rect x="592" y="1094" width="370" height="86" rx="18" fill="#091122" stroke="rgba(255,255,255,0.08)"/>
    <circle cx="734" cy="1137" r="30" fill="#31394d" stroke="#ffb4ab" stroke-width="4" filter="url(#blueGlow)"/>
    <circle cx="668" cy="1112" r="16" fill="#31394d" stroke="#ffb59a" stroke-width="3"/>
    <circle cx="798" cy="1108" r="15" fill="#31394d" stroke="#ffb59a" stroke-width="3"/>
    <circle cx="794" cy="1162" r="15" fill="#31394d" stroke="#ffb59a" stroke-width="3"/>
    <line x1="684" y1="1120" x2="713" y2="1130" stroke="#ffb4ab" stroke-width="5" stroke-linecap="round"/>
    <line x1="750" y1="1122" x2="782" y2="1114" stroke="#ffb4ab" stroke-width="5" stroke-linecap="round"/>
    <line x1="748" y1="1150" x2="783" y2="1158" stroke="#ffb4ab" stroke-width="5" stroke-linecap="round"/>
    <text x="718" y="1144" class="mono">BTC</text>
  </g>

  <text x="88" y="1278" class="section">4. Luồng hoạt động</text>

  <g filter="url(#softShadow)">
    <rect x="88" y="1310" width="904" height="240" rx="28" fill="url(#panel)" stroke="rgba(255,255,255,0.08)"/>

    <circle cx="162" cy="1430" r="30" fill="url(#accent)"/><text x="151" y="1438" class="cta">1</text>
    <circle cx="342" cy="1430" r="30" fill="url(#accent)"/><text x="331" y="1438" class="cta">2</text>
    <circle cx="522" cy="1430" r="30" fill="url(#accent)"/><text x="511" y="1438" class="cta">3</text>
    <circle cx="702" cy="1430" r="30" fill="url(#accent)"/><text x="691" y="1438" class="cta">4</text>
    <circle cx="882" cy="1430" r="30" fill="url(#accent)"/><text x="871" y="1438" class="cta">5</text>

    <line x1="192" y1="1430" x2="312" y2="1430" stroke="rgba(181,196,255,0.42)" stroke-width="4" stroke-linecap="round"/>
    <line x1="372" y1="1430" x2="492" y2="1430" stroke="rgba(181,196,255,0.42)" stroke-width="4" stroke-linecap="round"/>
    <line x1="552" y1="1430" x2="672" y2="1430" stroke="rgba(181,196,255,0.42)" stroke-width="4" stroke-linecap="round"/>
    <line x1="732" y1="1430" x2="852" y2="1430" stroke="rgba(181,196,255,0.42)" stroke-width="4" stroke-linecap="round"/>

    <text x="108" y="1372" class="bodySmall">Kết nối sàn</text>
    <text x="266" y="1372" class="bodySmall">Đồng bộ dữ liệu</text>
    <text x="454" y="1372" class="bodySmall">Phân tích rủi ro</text>
    <text x="646" y="1372" class="bodySmall">Cảnh báo + dashboard</text>
    <text x="836" y="1372" class="bodySmall">Hỗ trợ quyết định</text>

    <text x="106" y="1494" class="bodySmall">Binance / OKX</text>
    <text x="270" y="1494" class="bodySmall">Trades, balances, positions</text>
    <text x="428" y="1494" class="bodySmall">Quant engine + contagion map</text>
    <text x="656" y="1494" class="bodySmall">WebSocket alerts và summary</text>
    <text x="820" y="1494" class="bodySmall">Giảm drawdown cảm xúc</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="88" y="1586" width="904" height="250" rx="28" fill="url(#panel)" stroke="rgba(255,255,255,0.08)"/>
    <text x="120" y="1638" class="section">5. Giá trị mang lại</text>

    <circle cx="132" cy="1690" r="5" fill="#a8efb4"/>
    <text x="154" y="1697" class="body">Giảm mù rủi ro khi giao dịch trên nhiều sàn.</text>
    <circle cx="132" cy="1742" r="5" fill="#a8efb4"/>
    <text x="154" y="1749" class="body">Phát hiện sớm hành vi giao dịch cảm xúc và vị thế rủi ro.</text>
    <circle cx="132" cy="1794" r="5" fill="#a8efb4"/>
    <text x="154" y="1801" class="body">Biến dữ liệu giao dịch thành góc nhìn rủi ro có thể hành động.</text>

    <rect x="652" y="1650" width="296" height="126" rx="24" fill="url(#accent)" filter="url(#blueGlow)"/>
    <text x="684" y="1702" class="cta">CTA</text>
    <text x="684" y="1740" class="cardTitle" fill="#08111f">Bình chọn cho</text>
    <text x="684" y="1774" class="title" font-size="42" fill="#08111f">RiskHub</text>
    <text x="120" y="1840" class="label">Suggested footer: Team name · GitHub · Demo link · Vote CTA</text>
  </g>
</svg>
