    <line x1="550" y1="1402" x2="674" y2="1402" stroke="rgba(181,196,255,0.40)" stroke-width="4" stroke-linecap="round"/>
    <line x1="730" y1="1402" x2="854" y2="1402" stroke="rgba(181,196,255,0.40)" stroke-width="4" stroke-linecap="round"/>
