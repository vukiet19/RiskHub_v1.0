<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-labelledby="title desc">
  <title id="title">RiskHub clean infographic frame</title>
  <desc id="desc">Clean infographic frame with placeholders for a designer to fill in content, screenshots, and call to action.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07101d"/>
      <stop offset="48%" stop-color="#0b1326"/>
      <stop offset="100%" stop-color="#121b2f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b2438"/>
      <stop offset="100%" stop-color="#151d31"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#244da0" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#5b6c93" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b5c4ff"/>
      <stop offset="100%" stop-color="#2f6ef6"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffb59a"/>
      <stop offset="100%" stop-color="#ffb4ab"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#030815" flood-opacity="0.48"/>
    </filter>
    <style>
      .eyebrow { fill: #90a7e7; font: 600 20px 'Inter', 'Segoe UI', sans-serif; letter-spacing: 0.24em; text-transform: uppercase; }
      .heroTitle { fill: #f3f6ff; font: 800 66px 'Inter', 'Segoe UI', sans-serif; }
      .sectionTitle { fill: #eff4ff; font: 700 32px 'Inter', 'Segoe UI', sans-serif; }
      .label { fill: #9eb3ea; font: 600 15px 'Inter', 'Segoe UI', sans-serif; letter-spacing: 0.18em; text-transform: uppercase; }
      .placeholder { fill: #c2cadc; font: 400 22px 'Inter', 'Segoe UI', sans-serif; }
      .small { fill: #aeb9cf; font: 400 18px 'Inter', 'Segoe UI', sans-serif; }
      .cta { fill: #08111f; font: 700 22px 'Inter', 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <circle cx="160" cy="180" r="220" fill="#14305f" opacity="0.18"/>
  <circle cx="910" cy="260" r="250" fill="#143b71" opacity="0.13"/>
  <circle cx="920" cy="1690" r="250" fill="#6f2911" opacity="0.08"/>

  <rect x="56" y="48" width="968" height="1824" rx="38" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)"/>

