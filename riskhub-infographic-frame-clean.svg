    <rect x="286" y="1336" width="112" height="10" rx="5" fill="rgba(255,255,255,0.16)"/>
    <rect x="466" y="1336" width="112" height="10" rx="5" fill="rgba(255,255,255,0.16)"/>
    <rect x="646" y="1336" width="112" height="10" rx="5" fill="rgba(255,255,255,0.16)"/>
